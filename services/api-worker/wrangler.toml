name = "launchguard-api"
main = "src/index.js"
compatibility_date = "2026-03-04"
workers_dev = true

# Replace before first deploy.
account_id = "REPLACE_WITH_CLOUDFLARE_ACCOUNT_ID"

[vars]
APP_ENV = "dev"
DEFAULT_PLAN = "starter"

[[d1_databases]]
binding = "DB"
database_name = "launchguard-db-dev"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[[queues.producers]]
binding = "SCAN_QUEUE"
queue = "launchguard-scan-jobs-dev"

[[queues.consumers]]
queue = "launchguard-scan-jobs-dev"
max_batch_size = 5
max_batch_timeout = 10
